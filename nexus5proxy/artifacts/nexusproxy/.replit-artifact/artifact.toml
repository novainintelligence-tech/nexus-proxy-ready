kind = "web"
previewPath = "/nexusproxy/"
title = "NexusProxy - Proxy Service Website"
version = "1.0.0"
id = "artifacts/nexusproxy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nexusproxy/" ]
localPort = 23432

[services.development]
run = "pnpm --filter @workspace/nexusproxy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexusproxy", "run", "build" ]
publicDir = "artifacts/nexusproxy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23432"
BASE_PATH = "/nexusproxy/"
